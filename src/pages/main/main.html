<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>우동마켓 메인</title>
    <link rel="icon" href="../../../public/favicon.ico">
    <link rel="stylesheet" href="../../css/style.css" />
    <script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
    <script
      type="text/javascript"
      src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=01414d5bef98a8eb5d42a723a752b9b6&libraries=services"
    ></script>
    <script src="../js/common.js"></script>
    <script src="../js/main.js"></script>
  </head>

  <body>
    <div class="main-container">
      <section id="hero-banner" class="hero-banner">
        <div class="banner">
          <h1 class="banner-title">배송비 0원 챌린지!</h1>
          <p class="banner-subtitle">이웃과 함께 나누면 더 저렴해요 📦</p>
          <div class="banner-icon">🚚</div>
        </div>
      </section>

      <div class="main-content">
        <aside class="sidebar-left">
          <h2 class="category-title">카테고리</h2>
          <ul class="category-list">
            <li>
              <button class="category-item active" data-category="all">
                📂 전체보기
              </button>
            </li>
            <li>
              <button class="category-item" data-category="food">
                🍎 식품/농산물
              </button>
            </li>
            <li>
              <button class="category-item" data-category="living">
                🧻 생활/주방
              </button>
            </li>
            <li>
              <button class="category-item" data-category="furniture">
                🛋️ 가구/인테리어
              </button>
            </li>
            <li>
              <button class="category-item" data-category="digital">
                💻 디지털/가전
              </button>
            </li>
            <li>
              <button class="category-item" data-category="beauty">
                💄 뷰티/미용
              </button>
            </li>
            <li>
              <button class="category-item" data-category="fashion">
                👕 패션/의류
              </button>
            </li>
            <li>
              <button class="category-item" data-category="baby">
                👶 육아용품
              </button>
            </li>
            <li>
              <button class="category-item" data-category="sports">
                ⚽ 스포츠/레저
              </button>
            </li>
            <li>
              <button class="category-item" data-category="hobby">
                🎮 취미/게임/도서
              </button>
            </li>
            <li>
              <button class="category-item" data-category="pet">
                🐶 반려동물용품
              </button>
            </li>
            <li>
              <button class="category-item" data-category="others">
                🎸 기타
              </button>
            </li>
          </ul>

          <div class="filter-section" id="statusFilterSection">
            <h3 class="filter-title">거래 상태</h3>
            <div class="toggle-wrapper">
              <label class="switch">
                <input type="checkbox" id="toggleStatus" />
                <span class="slider round"></span>
              </label>
              <span class="toggle-label">모집중인 공구만 보기</span>
            </div>
          </div>

          <div class="filter-section" id="priceFilterSection">
            <h3 class="filter-title">가격대</h3>
            <div class="price-slider" id="priceSlider">
              <div class="slider-track" id="sliderTrack">
                <div class="slider-progress" id="sliderProgress"></div>
                <div
                  class="slider-handle min-handle"
                  id="handleMin"
                  style="left: 0%"
                ></div>
                <div
                  class="slider-handle max-handle"
                  id="handleMax"
                  style="left: 100%"
                ></div>
              </div>
              <div class="price-labels">
                <span id="labelMin">0원</span>
                <span id="labelMax">100,000원</span>
              </div>
            </div>
          </div>
        </aside>

        <main class="center-feed">
          <div class="feed-tabs">
            <button class="tab-btn active" data-view="products">
              🙋‍♂️ 모집 중인 공구
            </button>
            <button class="tab-btn" data-view="requests">
              📢 공구 요청해요
            </button>
          </div>

          <div class="feed-header">
            <h2 class="feed-title" id="feedTitle">모집 중인 공구</h2>
            <div class="sort-options" id="sortOptions">
              <span class="sort-option active">최신순</span>
              <span class="sort-divider">|</span>
              <span class="sort-option">거리순</span>
            </div>
          </div>

          <div class="feed-filters" id="feedFilters">
            <button class="filter-btn" data-tag="urgent">⚡️ 마감임박</button>
            <button class="filter-btn" data-tag="fresh">🌱 신선식품</button>
            <button class="filter-btn" data-tag="event">🎁 이벤트</button>
          </div>

          <div class="product-grid" id="productGrid">
            <template id="product-card-template">
              <article class="product-card">
                <div class="product-image">
                  <img src="" alt="" class="card-img" />
                  <div class="badge-group card-badges"></div>
                  <div class="product-author card-author"></div>
                </div>
                <div class="product-info">
                  <div class="card-header-row">
                    <h3 class="product-title card-title"></h3>
                  </div>
                  <p class="product-meta card-meta"></p>
                  <p class="product-price card-price"></p>
                  <div class="product-progress">
                    <div class="progress-bar">
                      <div class="progress-fill card-progress-fill"></div>
                    </div>
                    <p class="progress-text card-progress-text"></p>
                  </div>
                </div>
              </article>
            </template>
          </div>
        </main>

        <aside class="sidebar-right">
          <div class="widget highlighted">
            <h3 class="widget-title">나의 참여 현황</h3>
            <div class="participation-item"></div>
            <hr
              style="
                border: none;
                border-top: 1px solid #f1f3f5;
                margin: 16px 0;
              "
            />
            <div>
              <p class="savings-label">이번 달 아낀 배송비</p>
              <p class="savings-amount">0원 💰</p>
            </div>
            <button class="widget-button">자세히 보기</button>
          </div>

          <div class="widget" id="requestWidget">
            <div class="widget-header" id="requestWidgetHeader">
              <h3 class="widget-title">📢 이웃들의 공구 요청</h3>
            </div>
            <ul class="request-list"></ul>
            <button class="widget-button request-submit-btn primary">
              나도 요청글 쓰기
            </button>
          </div>

          <div class="widget">
            <div class="widget-header-recent">
              <h3 class="widget-title" style="margin-bottom: 0">
                👀 최근 본 공구
              </h3>
              <button id="btnClearRecent" class="btn-clear-recent">
                지우기
              </button>
            </div>
            <div class="recent-items" id="recentItemsList">
              <div class="recent-item">
                <div class="recent-placeholder">기록<br />없음</div>
              </div>
            </div>
          </div>
        </aside>
      </div>
    </div>
  </body>
</html>
