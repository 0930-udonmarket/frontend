<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mypage-home</title>
    <link href="../../css/mypage/mypage-home.css" rel="stylesheet">
    <link rel="icon" href="../../../public/favicon.ico">
    <script>
        window.__skipHeader = true;
    </script>
    <script src="../js/common.js"></script>
</head>

<body>
    <!-- <div class="header">
        <h1>header</h1>
    </div> -->

    <!-- 미니 헤더 (로고만) -->
    <header class="mini-header">
        <a href="../main/main.html" class="mini-header-logo-link">
            <img src="../../assets/로고.png" alt="우동마켓" class="mini-header-logo" />
            <div class="mini-header-logo-text">
                <img src="../../assets/logo-text.png" alt="우동마켓" />
            </div>
        </a>
    </header>

    <div class="main">
        <div class="menu">
            <div class="menu-title">마이페이지</div>
            <div class="items">
                <div class="home active">홈</div>
                <div class="orders">거래 내역</div>
                <div class="likes">관심 상품 (찜)</div>
                <div class="reviews">내가 작성한 리뷰</div>
                <div class="edit">내 정보 수정</div>
                <div class="cs">고객센터</div>
            </div>
            <!-- <div class="menu-footer">
                <div class="go-main">메인으로</div>
            </div> -->
        </div>

        <div class="content">
            <div class="container profile">
                <div class="user-img">
                    <svg class="profile-icon w-6 h-6 text-gray-800 dark:text-white" aria-hidden="true"
                        xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor"
                        viewBox="0 0 24 24">
                        <path fill-rule="evenodd"
                            d="M12 20a7.966 7.966 0 0 1-5.002-1.756l.002.001v-.683c0-1.794 1.492-3.25 3.333-3.25h3.334c1.84 0 3.333 1.456 3.333 3.25v.683A7.966 7.966 0 0 1 12 20ZM2 12C2 6.477 6.477 2 12 2s10 4.477 10 10c0 5.5-4.44 9.963-9.932 10h-.138C6.438 21.962 2 17.5 2 12Zm10-5c-1.84 0-3.333 1.455-3.333 3.25S10.159 13.5 12 13.5c1.84 0 3.333-1.455 3.333-3.25S13.841 7 12 7Z"
                            clip-rule="evenodd" />
                    </svg>
                </div>
                <div class="user-info">
                    <div class="name"></div>
                    <div class="address"></div>
                </div>
                <button class="edit-btn">정보 수정</button>
            </div>

            <div class="container summary">
                <div class="buy">
                    <div class="group">
                        <div class="icon">🛒</div>
                        <div class="text">구매 내역</div>
                    </div>
                    <div class="count" id="buy-count">0</div>
                </div>
                <div class="sell">
                    <div class="group">
                        <div class="icon">🏷️</div>
                        <div class="text">판매/모집</div>
                    </div>
                    <div class="count" id="sell-count">0</div>
                </div>
                <div class="like" style="cursor:pointer;" onclick="window.location.href='./likes.html'">
                    <div class="group">
                        <div class="icon">❤️</div>
                        <div class="text">찜한 상품</div>
                    </div>
                    <div class="count" id="like-count">0</div>
                </div>
            </div>

            <div class="container2"> 
                <h2 class="container2-header">
                    현재 진행 거래
                    <a href="./orders.html">더보기 →</a>
                </h2>
            </div>
            <div class="transaction-container"></div>
        </div>

    </div>

    <script>
        document.querySelector(".home")?.addEventListener('click', () => {
            window.location.href = './home.html';
        });

        document.querySelector(".orders")?.addEventListener('click', () => {
            window.location.href = './orders.html';
        });

        document.querySelector(".likes")?.addEventListener('click', () => {
            window.location.href = './likes.html';
        });

        document.querySelector(".reviews")?.addEventListener('click', () => {
            window.location.href = './reviews/list.html';
        });

        document.querySelector(".edit")?.addEventListener('click', () => {
            window.location.href = './edit.html';
        });

        document.querySelector(".edit-btn")?.addEventListener('click', () => {
            window.location.href = './edit.html'; // 내 정보 수정 페이지로 이동 
        });

        // 페이지가 로드되면 실행
        window.addEventListener('DOMContentLoaded', () => {
            fetchUserInfo();
            fetchAddressInfo();
            fetchLikeCount();
            fetchCurrentTransactions('ACTIVE');
        });

        const userId = localStorage.getItem('userId') || sessionStorage.getItem('userId');

        async function fetchUserInfo() {
            if (!userId) {
                alert("잘못된 접근입니다.");
                return;
            }

            try {
                const userResponse = await fetch(`http://localhost:8080/api/users/mypage/${userId}`);
                if (!userResponse.ok) throw new Error("데이터 없음");

                const userData = await userResponse.json();

                // name → nickname 으로 수정
                document.querySelector(".name").textContent = `${userData.nickname || userData.name} 님`;

            } catch (error) {
                console.error("유저 데이터 로드 실패: ", error);
            }
        }

        async function fetchAddressInfo() {
            try {
                // common.js의 UdongAPI 방식으로 통일
                const locations = await UdongAPI.getUserLocations("buyer");

                console.log("받은 주소 데이터:", locations);

                if (locations.length > 0) {
                    // selected: true 인 주소 우선, 없으면 첫 번째
                    const selected = locations.find(loc => loc.selected) || locations[0];
                    const fullAddress = `${selected.sido} ${selected.sigungu} ${selected.legalDong}`;
                    document.querySelector(".address").textContent = fullAddress;
                }

            } catch (error) {
                console.error("주소 데이터 로드 실패: ", error);
            }
        }

        async function fetchLikeCount() {

            try {
                const likeResponse = await fetch(`http://localhost:8080/api/likes/${userId}`);

                if (likeResponse.ok) {
                    const likes = await likeResponse.json(); // 배열 형태로 받아옴

                    const likeCount = likes.length;

                    console.log("찜 목록 개수: ", likeCount);

                    document.getElementById("like-count").textContent = likeCount;
                }

            } catch (error) {
                console.error("찜 목록 개수 가져오기 실패: ", error);
            }

        }

        async function fetchCurrentTransactions(status) {
            try {

                const response = await fetch(`http://localhost:8080/api/order?userId=${userId}&status=${status}`); // 실제 백엔드 주소
                const transactionDatas = await response.json();

                displayCurrentTransactions(transactionDatas, status);
            } catch (error) {
                console.error("데이터 로드 실패: ", error);
            }
        }

        function displayCurrentTransactions(transactionDatas, status) {
            const container = document.querySelector(".transaction-container");
            container.innerHTML = "";

            if (transactionDatas.length === 0) {
                container.innerHTML = "<p class='empty-msg'>현재 진행 중인 거래가 없습니다. 😊</p>";
                return;
            }

            transactionDatas.forEach(bd => {

                const transactionData = {
                    status: bd.partStatus,
                    title: bd.postTitle,
                    seller: bd.sellerName,
                    date: bd.postCreatedAt.split('T')[0],
                    price: bd.pricePerPerson,
                    image: bd.postImage
                };

                const card = document.createElement("div");
                card.className = `transaction-card`;

                card.innerHTML = `
                    <div class="transaction-content">
                        <div class="product-img">
                            ${transactionData.image
                                ? `<img src="${transactionData.image}" alt="상품 이미지" style="width:100%; height:100%; object-fit:cover; border-radius:8px;" />`
                                : ''}
                        </div>
                        <div class="product-info">
                            <div class="product-title">${transactionData.title}</div>
                            <div class="product-meta">${transactionData.date} • 판매자: ${transactionData.seller}</div>
                        </div>
                        <div class="price">${transactionData.price} 원</div>
                        <button class="move-btn">거래/채팅 이동</button>
                    </div>
                `

                container.appendChild(card);
            });
        }
    </script>

</body>

</html>
