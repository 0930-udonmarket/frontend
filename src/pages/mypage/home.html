<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mypage-home</title>
    <link href="../../css/mypage/mypage-home.css" rel="stylesheet">
    <link rel="icon" href="../../../public/favicon.ico">

</head>

<body>
    <div class="header">
        <h1>header</h1>
    </div>

    <div class="main">
        <div class="menu">
            <div class="menu-title">마이페이지</div>
            <div class="items">
                <div class="home active">홈</div>
                <div class="orders">거래 내역</div>
                <div class="likes">관심 상품 (찜)</div>
                <div class="reviews">내가 작성한 리뷰</div>
                <div class="edit">내 정보 수정</div>
                <div class="cs">고객센터</div>
            </div>
        </div>

        <div class="content">
            <div class="container profile">
                <div class="user-img"></div>
                <div class="user-info">
                    <div class="name"></div>
                    <div class="address"></div>
                </div>
                <button class="edit-btn">정보 수정</button>
            </div>

            <div class="container summary">
                <div class="buy">
                    <div class="group">
                        <div class="icon">🛒</div>
                        <div class="text">구매 내역</div>
                    </div>
                    <div class="count" id="buy-count">0</div>
                </div>
                <div class="sell">
                    <div class="group">
                        <div class="icon">🏷️</div>
                        <div class="text">판매/모집</div>
                    </div>
                    <div class="count" id="sell-count">0</div>
                </div>
                <div class="like">
                    <div class="group">
                        <div class="icon">❤️</div>
                        <div class="text">찜한 상품</div>
                    </div>
                    <div class="count" id="like-count">0</div>
                </div>
            </div>

            <div class="container2">
                <h2>현재 진행 거래</h2>
                <div class="transaction-container">

                </div>
            </div>
        </div>

    </div>

    <script>

        document.querySelector(".home")?.addEventListener('click', () => {
            window.location.href = './home.html';
        });

        document.querySelector(".orders")?.addEventListener('click', () => {
            window.location.href = './orders.html';
        });

        document.querySelector(".likes")?.addEventListener('click', () => {
            window.location.href = './likes.html';
        });

        document.querySelector(".reviews")?.addEventListener('click', () => {
            window.location.href = './reviews/list.html';
        });

        document.querySelector(".edit")?.addEventListener('click', () => {
            window.location.href = './edit.html';
        });

        document.querySelector(".edit-btn")?.addEventListener('click', () => {
            window.location.href = './edit.html'; // 내 정보 수정 페이지로 이동 
        });

        // 페이지가 로드되면 실행
        window.addEventListener('DOMContentLoaded', () => {
            fetchUserInfo();
            fetchAddressInfo();
            fetchLikeCount();
            fetchCurrentTransactions('ACTIVE');
        });

        const userId = localStorage.getItem('userId') || 1;

        async function fetchUserInfo() {

            const urlParams = new URLSearchParams(window.location.search);


            if (!userId) {
                alert("잘못된 접근입니다.");
                return;
            }

            try {
                const userResponse = await fetch(`http://localhost:8080/api/users/mypage/${userId}`); // 실제 백엔드 주소

                if (!userResponse.ok) throw new Error("데이터 없음");

                const userData = await userResponse.json();

                document.querySelector(".name").textContent = `${userData.name} 님`;


            } catch (error) {
                console.error("유저 데이터 로드 실패: ", error);
            }
        };

        async function fetchAddressInfo() {

            try {
                const userId = 10;
                const addressResponse = await fetch(`http://localhost:8080/api/v1/users/locations/${userId}`);

                if (!addressResponse.ok) throw new Error("데이터 없음");

                const addressData = await addressResponse.json();
                console.log("받은 데이터:", addressData);

                // 데이터가 있는지 먼저 확인
                if (addressData.length > 0) {
                    
                    const firstLocation = addressData[0];
                    console.log(addressData[0]);
                    const fullAddress = `${firstLocation.sido} ${firstLocation.sigungu} ${firstLocation.legalDong}`;

                    document.querySelector(".address").textContent = fullAddress;
                }
            } catch (error) {
                console.error("주소 데이터 로드 실패: ", error);
            }

        };

        async function fetchLikeCount() {

            try {
                const likeResponse = await fetch(`http://localhost:8080/api/likes/${userId}`);

                if (likeResponse.ok) {
                    const likes = await likeResponse.json(); // 배열 형태로 받아옴

                    const likeCount = likes.length;

                    console.log("찜 목록 개수: ", likeCount);

                    document.getElementById("like-count").textContent = likeCount;
                }

            } catch (error) {
                console.error("찜 목록 개수 가져오기 실패: ", error);
            }

        }

        async function fetchCurrentTransactions(status) {
            try {

                const response = await fetch(`http://localhost:8080/api/order?userId=${userId}&status=${status}`); // 실제 백엔드 주소
                const transactionDatas = await response.json();

                displayCurrentTransactions(transactionDatas, status);
            } catch (error) {
                console.error("데이터 로드 실패: ", error);
            }
        }

        function displayCurrentTransactions(transactionDatas, status) {
            const container = document.querySelector(".transaction-container");
            container.innerHTML = "";

            if (transactionDatas.length === 0) {
                container.innerHTML = "<p class='empty-msg'>현재 진행 중인 거래가 없습니다. 😊</p>";
                return;
            }

            transactionDatas.forEach(bd => {

                const transactionData = {
                    status: bd.partStatus,
                    title: bd.postTitle,
                    seller: bd.sellerName,
                    date: bd.postCreatedAt.split('T')[0],
                    price: bd.pricePerPerson
                };

                const card = document.createElement("div");
                card.className = `transaction-card`;

                card.innerHTML = `
                    <div class="transaction-content">
                        <div class="product-img"></div>
                        <div class="product-info">
                            <div class="product-title">${transactionData.title}</div>
                            <div class="product-meta">${transactionData.date} • 판매자: ${transactionData.seller}</div>
                        </div>
                        <div class="price">${transactionData.price} 원</div>
                        <button class="move-btn">거래/채팅 이동</button>
                    </div>
                `

                container.appendChild(card);
            });
        }
    </script>

</body>

</html>
