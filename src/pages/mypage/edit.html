        async function fetchUserInfo() {
            const userId = localStorage.getItem('userId') || sessionStorage.getItem('userId');

            try {

                const userData = await userResponse.json();
                currentUserData = userData; // 전역 저장

                document.querySelector(".name").textContent = `${userData.nickname || userData.name} 님`;
                // document.querySelector(".name").textContent = `${userData.name} 님`;
                // document.querySelector(".detail").textContent = userData.address;

            } catch (error) {
                console.error("데이터 로드 실패: ", error);
            }
        }

        document.querySelector(".input-nickname")?.addEventListener("input", (e) => {
            const msg = document.getElementById("msg-nickname");
            if (e.target.value.length < 2) {
                msg.textContent = "닉네임은 2자 이상이어야 합니다.";
                msg.style.color = "red";
            } else {

            }

            }
        });

        // 닉네임 저장
        async function saveNickname() {
            const newNickname = document.querySelector(".input-nickname").value.trim();

            if (!newNickname || newNickname.length < 2) {
                alert("닉네임은 2자 이상 입력해주세요.");
                return;
            }

            const userId = localStorage.getItem('userId') || sessionStorage.getItem('userId');

            try {
                const response = await fetch(`http://localhost:8080/api/users/nickname`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('udong_access_token')}`
                    },
                    body: JSON.stringify({
                        userId: userId,
                        nickname: newNickname
                    })
                });

                if (!response.ok) {
                    const error = await response.json();
                    alert(error.message || "닉네임 변경에 실패했습니다.");
                    return;
                }

                // 변경 전 - 닉네임으로 화면 업데이트 (잘못됨)
                // document.querySelector(".name").textContent = `${newNickname} 님`;

                // 변경 후 - name 컬럼 그대로 유지
                currentUserData.nickname = newNickname; // 전역 데이터만 업데이트

                // localStorage의 udong_user_info도 업데이트
                const userInfo = JSON.parse(localStorage.getItem('udong_user_info') || '{}');
                userInfo.nickname = newNickname;
                localStorage.setItem('udong_user_info', JSON.stringify(userInfo));

                alert("닉네임이 변경되었습니다.");
                closeNicknameModal();

            } catch (error) {
                console.error("닉네임 변경 실패:", error);
                alert("서버 오류가 발생했습니다.");
            }
        }

        async function fetchAddressInfo() {
            try {
                const locations = await UdongAPI.getUserLocations("buyer");

                if (locations.length > 0) {
                    const selected = locations.find(loc => loc.selected) || locations[0];
                    const fullAddress = `${selected.sido} ${selected.sigungu} ${selected.legalDong}`;
                    document.querySelector(".address").textContent = fullAddress;
                }
            } catch (error) {
                console.error("주소 데이터 로드 실패: ", error);
            }
        }

        async function openAddrOrAuth() {
            try {
                const locations = await UdongAPI.getUserLocations("buyer");

                if (locations.length === 0) {
                    // 동네 인증이 없으면 GPS 인증으로 이동
                    if (confirm('등록된 동네가 없습니다.\n동네 인증을 진행하시겠습니까?')) {
                        window.startGpsAuth(-1);
                    }
                } else {
                    // 동네가 있으면 기존 모달 열기
                    openAddrModal();
                }
            } catch (error) {
                console.error("동네 확인 실패:", error);
            }
        }

        let allLocations = []; // 전체 동네 목록 저장

        // 동네 모달 열기
        async function openAddrModal() {
            try {
                allLocations = await UdongAPI.getUserLocations("buyer");

                const addrList = document.getElementById("addrList");
                addrList.innerHTML = "";

                if (allLocations.length === 0) {
                    addrList.innerHTML = "<p class='empty-msg'>등록된 동네가 없습니다.</p>";
                } else {
                    allLocations.forEach((loc, index) => {
                        const fullAddress = `${loc.sido} ${loc.sigungu} ${loc.legalDong}`;
                        const item = document.createElement("div");
                        item.className = `addr-item ${loc.selected ? "selected" : ""}`;
                        item.innerHTML = `
                            <span class="addr-text">${fullAddress}</span>
                            ${loc.selected ? '<span class="addr-badge">대표</span>' : ''}
                        `;
                        item.addEventListener("click", () => selectAddr(index));
                        addrList.appendChild(item);
                    });
                }

                document.getElementById("addrModal").style.display = "flex";

            } catch (error) {
                console.error("동네 목록 로드 실패:", error);
                alert("동네 목록을 불러오지 못했습니다.");
            }
        }

        // 동네 선택
        async function selectAddr(selectedIndex) {
            try {
                // selected 업데이트
                allLocations = allLocations.map((loc, i) => ({
                    ...loc,
                    selected: i === selectedIndex
                }));

                await UdongAPI.saveUserLocations("buyer", allLocations);

                // 화면 주소 업데이트
                const selected = allLocations[selectedIndex];
                const fullAddress = `${selected.sido} ${selected.sigungu} ${selected.legalDong}`;
                document.querySelector(".address").textContent = fullAddress;

                closeAddrModal();
                alert("대표 동네가 변경되었습니다.");

            } catch (error) {
                console.error("동네 선택 실패:", error);
                alert("동네 선택에 실패했습니다.");
            }
        }

        // 모달 닫기
        function closePwdModal() {

            // 입력값 초기화
            document.querySelector(".input-pwd-current").value = "";
            document.querySelector(".input-pwd-new").value = "";
            document.querySelector(".input-pwd-confirm").value = "";

        // 새 비밀번호 입력 시 실시간 유효성 검사
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelector(".input-pwd-new")?.addEventListener('input', (e) => {
                const msg = document.getElementById("msg-new");
                if (e.target.value.length > 0 && e.target.value.length < 8) {
                    msg.textContent = "8자 이상 입력해주세요.";
                    msg.style.color = "red";
                } else {
                    msg.textContent = "";
                }
            });

            document.querySelector(".input-pwd-confirm")?.addEventListener('input', (e) => {
                const newPwd = document.querySelector(".input-pwd-new").value;
                const msg = document.getElementById("msg-confirm");
                if (e.target.value && e.target.value !== newPwd) {
                    msg.textContent = "비밀번호가 일치하지 않습니다.";
                    msg.style.color = "red";
                } else if (e.target.value && e.target.value === newPwd) {
                    msg.textContent = "비밀번호가 일치합니다.";
                    msg.style.color = "green";
                } else {
                    msg.textContent = "";
                }
            });
        });

        async function savePwd() {
            const currentPwd = document.querySelector(".input-pwd-current").value.trim();
            const newPwd = document.querySelector(".input-pwd-new").value.trim();
            const confirmPwd = document.querySelector(".input-pwd-confirm").value.trim();

            if (!currentPwd || !newPwd || !confirmPwd) {
                alert("모든 항목을 입력해주세요.");
                return;
            }
            if (newPwd.length < 8) {
                alert("새 비밀번호는 8자 이상이어야 합니다.");
                return;
            }
            if (newPwd !== confirmPwd) {
                alert("새 비밀번호가 일치하지 않습니다.");
                return;
            }

            const userId = localStorage.getItem('userId') || sessionStorage.getItem('userId');

            try {
                const response = await fetch(`http://localhost:8080/api/users/change-password`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('udong_access_token')}`
                    },
                    body: JSON.stringify({
                        userId: userId,
                        currentPassword: currentPwd,
                        newPassword: newPwd
                    })
                });

                if (!response.ok) {
                    const error = await response.json();
                    alert(error.message || "현재 비밀번호가 올바르지 않습니다.");
                    return;
                }

                alert("비밀번호가 변경되었습니다.");
                closePwdModal();

            } catch (error) {
                console.error("비밀번호 변경 실패: ", error);
                alert("서버 오류가 발생했습니다.");
            }
        }

    </script>

    <!-- 비밀번호 변경 모달 -->
    <div class="modal-overlay" id="pwdModal" style="display:none;">
        <div class="modal-box">
            <div class="modal-header">
                <h3>비밀번호 변경</h3>
                <button class="modal-close" onclick="closePwdModal()">✕</button>
            </div>
            <div class="modal-body">
                <div class="modal-field">
                    <label>현재 비밀번호</label>
                    <input class="input-pwd-current" type="password" placeholder="현재 비밀번호 입력" />
                </div>
                <div class="modal-field">
                    <label>새 비밀번호</label>
                    <input class="input-pwd-new" type="password" placeholder="8자 이상 입력" />
                    <span class="input-msg" id="msg-new"></span>
                </div>
                <div class="modal-field">
                    <label>새 비밀번호 확인</label>
                    <input class="input-pwd-confirm" type="password" placeholder="새 비밀번호 재입력" />
                    <span class="input-msg" id="msg-confirm"></span>
                </div>
            </div>
            <div class="modal-footer">
                <button class="modal-cancel-btn" onclick="closePwdModal()">취소</button>
                <button class="modal-save-btn" onclick="savePwd()">변경하기</button>
            </div>
        </div>
    </div>

    <!-- 동네 선택 모달 -->
    <div class="modal-overlay" id="addrModal" style="display:none;">
        <div class="modal-box">
            <div class="modal-header">
                <h3>동네 선택</h3>
                <button class="modal-close" onclick="closeAddrModal()">✕</button>
            </div>
            <div class="modal-body">
                <p class="modal-desc">대표 동네를 선택해주세요.</p>
                <div class="addr-list" id="addrList"></div>
            </div>
            <div class="modal-footer">
                <button class="modal-cancel-btn" onclick="closeAddrModal()">닫기</button>
            </div>
        </div>
    </div>

    <!-- 닉네임 변경 모달 -->
    <div class="modal-overlay" id="nicknameModal" style="display:none;">
        <div class="modal-box">
            <div class="modal-header">
                <h3>닉네임 변경</h3>
                <button class="modal-close" onclick="closeNicknameModal()">✕</button>
            </div>
            <div class="modal-body">
                <div class="modal-field">
                    <label>닉네임</label>
                    <input class="input-nickname" type="text" placeholder="새 닉네임 입력" maxlength="10" />
                    <span class="input-msg" id="msg-nickname"></span>
                </div>
            </div>
            <div class="modal-footer">
                <button class="modal-cancel-btn" onclick="closeNicknameModal()">취소</button>
                <button class="modal-save-btn" onclick="saveNickname()">변경하기</button>
            </div>
        </div>
    </div>
</body>

</html>
