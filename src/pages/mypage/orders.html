    <script>

        document.querySelector(".home")?.addEventListener('click', () => {
            window.location.href = './home.html';
        });

        document.querySelector(".orders")?.addEventListener('click', () => {
            window.location.href = './orders.html';
        });

        document.querySelector(".likes")?.addEventListener('click', () => {
            window.location.href = './likes.html';
        });

        document.querySelector(".reviews")?.addEventListener('click', () => {
            window.location.href = './reviews/list.html';
        });

        document.querySelector(".edit")?.addEventListener('click', () => {
            window.location.href = './edit.html';
        });

        window.addEventListener('DOMContentLoaded', async () => {
            await fetchTransactions('ACTIVE'); // 처음 로딩됐을 때는 '거래 중' 데이터만 가져오기
            
        });

        document.querySelector(".go-main")?.addEventListener('click', () => {
            window.location.href = '../main/main.html';
        });

        const btnIng = document.getElementById("btn-ing");
        const btnEnd = document.getElementById("btn-end");

        // 거래 중 버튼 클릭 시
        btnIng.addEventListener('click', () => {
            fetchTransactions('ACTIVE');
            setActiveButton(btnIng);
        });

        // 거래 완료 버튼 클릭 시
        btnEnd.addEventListener('click', () => {
            fetchTransactions('COMPLETED');
            setActiveButton(btnEnd);

        });

        function setActiveButton(activeBtn) {
            btnIng.classList.remove('select');
            btnEnd.classList.remove('select');
            activeBtn.classList.add('select');
        };

        async function fetchTransactions(status) {
            try {
                // const userId = 1; // 테스트용
                const userId = localStorage.getItem('userId') || sessionStorage.getItem('userId');

                const response = await fetch(`http://localhost:8080/api/order?userId=${userId}&status=${status}`); // 실제 백엔드 주소
                
                if (!response.ok) throw new Error("서버 응답 에러");

                const transactions = await response.json();

                console.log("받은 데이터:", transactions);

                displayTransactions(transactions, status);


            } catch (error) {
                console.error("데이터 로드 실패: ", error);
            }
        };
        
        function displayTransactions(transactions, currentStatus) {

            const container = document.querySelector(".transaction-container");
            container.innerHTML = "";

            transactions.forEach(bd => { // backendData
                const transaction = {
                    status: bd.partStatus === 'ACTIVE' ? 'ing' : 'end',
                    title: bd.postTitle,
                    seller: bd.sellerName,
                    date: bd.postCreatedAt.split('T')[0],
                    price: bd.pricePerPerson,
                    deliveryStatus: "배송 준비 중", // 테스트용
                    image: bd.postImage
                };

                const card = document.createElement("div");
                card.className = `transaction-card ${transaction.status}`;

                let actionContent = "";
                if (transaction.status === 'ing') { // status가 거래 중일 때 
                    actionContent = `
                        <div class="transaction-actions">
                            <div class="price">${transaction.price} 원</div>
                            <div class="btn-container">
                                <button class="move-btn">거래/채팅 이동</button>
                            </div>
                        </div>
                    `;
                } else {
                    actionContent = `
                        <div class="transaction-actions">
                            <div class="status">${transaction.deliveryStatus}</div>
                            <div class="btn-container">
                                <button class="review-btn" onclick="location.href='./reviews/create.html?postId=${bd.postId}'">리뷰 쓰기</button>
                                <button class="check-btn">배송 조회</button>
                            </div>
                        </div>
                    `;
                }

                card.innerHTML = `
                    <div class="transaction-content">
                        <div class="product-img">
                            ${transaction.image
                                ? `<img src="${transaction.image}" alt="상품 이미지" style="width:100%; height:100%; object-fit:cover; border-radius:8px;" />`
                                : ''}
                        </div>
                        <div class="product-info">
                            <div class="product-title">${transaction.title}</div>
                            <div class="product-meta">${transaction.date} • 판매자: ${transaction.seller}</div>
                        </div>
                        ${actionContent}
                    </div>
                `;

                container.appendChild(card);
            });
        }


    </script>
