<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mypage-reivews-list</title>

    <link href="../../../css/mypage/reviews/reviews-list.css" rel="stylesheet">
    <link rel="icon" href="../../../../public/favicon.ico">
    <script>
        window.__skipHeader = true;
    </script>
    <script src="../../js/common.js"></script>
</head>

<body>
    <!-- <div class="header">
        <h1>header</h1>
    </div> -->

    <!-- 미니 헤더 (로고만) -->
    <header class="mini-header">
        <a href="../../main/main.html" class="mini-header-logo-link">
            <img src="../../../assets/로고.png" alt="우동마켓" class="mini-header-logo" />
            <div class="mini-header-logo-text">
                <img src="../../../assets/logo-text.png" alt="우동마켓" />
            </div>
        </a>
    </header>

    <div class="main">
        <div class="menu">
            <div class="menu-title">마이페이지</div>
            <div class="items">
                <div class="home">홈</div>
                <div class="orders">거래 내역</div>
                <div class="likes">관심 상품 (찜)</div>
                <div class="reviews active">내가 작성한 리뷰</div>
                <div class="edit">내 정보 수정</div>
                <div class="cs">고객센터</div>
            </div>
        </div>

        <div class="content">
            <div class="transaction-container">
                <p>리뷰를 불러오는 중입니다...</p>
            </div>
        </div>

    <script>
        document.querySelector(".home")?.addEventListener('click', () => {
            window.location.href = '../home.html';
        })

        document.querySelector(".orders")?.addEventListener('click', () => {
            window.location.href = '../orders.html';
        })

        document.querySelector(".likes")?.addEventListener('click', () => {
            window.location.href = '../likes.html';
        })

        document.querySelector(".reviews")?.addEventListener('click', () => {
            window.location.href = '../reviews/list.html';
        })

        document.querySelector(".edit")?.addEventListener('click', () => {
            window.location.href = '../edit.html';
        })

        window.addEventListener('DOMContentLoaded', async () => {
            await fetchAllReviews();
        });

        async function fetchAllReviews() {
            try {
                // const userId = 1; // localStorage.getItem('userId');
                const userId = localStorage.getItem('userId') || sessionStorage.getItem('userId');

                if (!userId) {
                    alert("잘못된 접근입니다.");
                    return;
                }

                const response = await fetch(`http://localhost:8080/api/review/list/${userId}`);
                if (!response.ok) throw new Error("서버 응답 에러");

                const reviews = await response.json();
                console.log("받은 데이터:", reviews);
                display(reviews);

            } catch (error) {
                console.error("데이터 로드 실패: ", error);
            }
        }

        function display(reviews) {
            const container = document.querySelector(".transaction-container");
            container.innerHTML = "";

            if (reviews.length === 0) {
                container.innerHTML = "<p class='empty-msg'>작성한 리뷰가 없습니다. 😊</p>";
                return;
            }

            reviews.forEach(review => {
                const card = document.createElement("div");
                card.className = "transaction-card";

                const dateFormatting = review.createdAt ? review.createdAt.split('T')[0] : "날짜 없음";

                card.innerHTML = `
                    <div class="transaction-content">
                        <div class="product-img">
                            ${review.imageUrls?.[0]
                            ? `<img src="${review.imageUrls[0]}" alt="리뷰 이미지" style="width:100%; height:100%; object-fit:cover; border-radius:8px;" />`
                            : ''}
                        </div>
                        <div class="product-info">
                            <div class="product-title">${review.content || "내용 없음"}</div>
                            <div class="product-meta">${dateFormatting} • 별점: ${'⭐'.repeat(review.rating || 0)}</div>
                        </div>
                        <div class="icon-container">
                            <div class="move-icon" style="cursor:pointer" onclick="location.href='./detail.html?id=${review.id}'">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
                                    <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m9 5 7 7-7 7" />
                                </svg>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }
    </script>

</body>

</html>
