
<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>reviews-detail</title>
    <link href="../../../css/mypage/reviews/reviews-detail.css" rel="stylesheet">
    <link rel="icon" href="../../../../public/favicon.ico">
</head>

<body>
    <div class="main">
        <div class="header">
            <svg class="chevron w-6 h-6 text-gray-800 dark:text-white" aria-hidden="true"
                xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="none" viewBox="0 0 24 24">
                <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="m14 8-4 4 4 4" />
            </svg>
            <h2 class="header-title">리뷰 상세</h2>
        </div>

        <div class="content">
            <div class="product-container">
                <div class="product-info">
                    <div class="product-img"></div>
                    <div class="product-name"></div>
                </div>
            </div>

            <div class="for-hr"></div>

            <div class="profile-container">
                <div class="user-img"></div>
                <div class="user-name"></div>
            </div>

            <div class="review-info-container">
                <div class="rating-container">
                    <div class="stars" id="starRating">
                        <div class="star" data-rating="1">
                            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path
                                    d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z" />
                            </svg>
                        </div>
                        <div class="star" data-rating="2">
                            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path
                                    d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z" />
                            </svg>
                        </div>
                        <div class="star" data-rating="3">
                            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path
                                    d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z" />
                            </svg>
                        </div>
                        <div class="star" data-rating="4">
                            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path
                                    d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z" />
                            </svg>
                        </div>
                        <div class="star" data-rating="5">
                            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path
                                    d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z" />
                            </svg>
                        </div>
                    </div>
                </div>

                <div class="review-date">
                </div>
            </div>


            <!-- Review Container -->
            <div class="review-container">
                <div class="review-image-container"></div>
                <div class="review-text-container">
                    <div class="review-text"></div>
                
    
                </div>
            </div>

        </div>

    </div>

    <script>
        document.querySelector(".chevron")?.addEventListener('click', () => {
            window.location.href = './list.html';
        });

        window.addEventListener('DOMContentLoaded', () => {
            fetchReview();
        });

        async function fetchReview() {

            const urlParams = new URLSearchParams(window.location.search);
            const userId = localStorage.getItem('userId') || 1;
            const reviewId = urlParams.get('id') || 1; // URL에서 id 가져오기

            if (!reviewId || !userId) {
                alert("잘못된 접근입니다.");
                window.location.href = './list.html';
                return;
            }

            // 리뷰 데이터 먼저 가져오기 
            try {
                const reviewResponse = await fetch(`http://localhost:8080/api/review/${reviewId}`);
                if (!reviewResponse.ok) throw new Error("리뷰 데이터 없음");
                const reviewData = await reviewResponse.json(); // 서버에서 받은 데이터

                console.log("받아온 데이터:", reviewData);

                const userResponse = await fetch(`http://localhost:8080/api/users/mypage/${userId}`);
                if (!userResponse.ok) throw new Error("유저 데이터 없음");
                const userData = await userResponse.json();

                document.querySelector(".product-name").textContent = "상품 번호: " + reviewData.productId;
                document.querySelector(".user-name").textContent = userData.name;
            
                const stars = document.querySelectorAll('.star');
                const rating = reviewData.rating;

                stars.forEach(star => {
                    const starValue = parseInt(star.getAttribute('data-rating'));
                    if (starValue <= rating) {
                        star.classList.add('active');
                    } else {
                        star.classList.remove('active');
                    }
                });

                const reviewImageContainer = document.querySelector(".review-image-container");
                reviewImageContainer.innerHTML = "";

                if (reviewData.imageUrls && reviewData.imageUrls.length > 0) {
                    reviewData.imageUrls.forEach(url => { // url 자체가 문자열 
                        const reviewImgTag = document.createElement("img");
                        reviewImgTag.src = `http://localhost:8080/api${url}`;
                        reviewImgTag.style.width = "100%";
                        reviewImgTag.style.maxWidth = "200px";
                        reviewImgTag.style.height = "auto";
                        reviewImgTag.style.objectFit = "cover";
                
                        reviewImageContainer.appendChild(reviewImgTag);
                    });
                }

                document.querySelector(".review-text").textContent = reviewData.content;

                const dateFormatting = reviewData.createdAt ? reviewData.createdAt.split('T')[0] : null;
                document.querySelector(".review-date").textContent = dateFormatting;

            } catch (error) {
                console.error("데이터 로드 실패: ", error);
            }
        };

    </script>
</body>

</html>
